<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title id="page-title">Post — Abbas Merchant</title>
  <meta name="description" id="page-desc" content="" />
  <meta property="og:title" id="og-title" content="Abbas Merchant" />
  <meta property="og:description" id="og-desc" content="" />
  <meta property="og:image" id="og-image" content="" />
  <link rel="stylesheet" href="style.css" />
  <script>
    if (localStorage.getItem('theme') === 'dark') document.documentElement.classList.add('dark');
  </script>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">Abbas <em>Merchant</em></a>
    <div class="nav-r">
      <a href="index.html" class="nav-link">Journal</a>
      <a href="about.html" class="nav-link">About</a>
      <button class="dark-toggle" id="theme-toggle" onclick="toggleTheme()" aria-label="Toggle dark mode">☀</button>
      <a href="/admin/" class="nav-write">Write ✦</a>
    </div>
  </div>
</nav>

<div class="post-wrap">
  <div class="cat-tag" id="post-tag"></div>
  <h1 id="post-title">Loading…</h1>
  <div class="post-meta">
    <span id="post-read"></span>
    <time id="post-date"></time>
  </div>
  <img class="post-cover" id="post-cover" alt="" style="display:none" />
  <div class="post-content" id="post-content"></div>
  <div class="post-back">
    <a href="index.html">← Back to the journal</a>
  </div>
</div>

<footer>
  <p>Words and pictures by <strong>Abbas Merchant</strong> · <a href="index.html">Journal</a></p>
</footer>

<script>
function toggleTheme() {
  const dark = document.documentElement.classList.toggle('dark');
  localStorage.setItem('theme', dark ? 'dark' : 'light');
  document.getElementById('theme-toggle').textContent = dark ? '☾' : '☀';
}
document.getElementById('theme-toggle').textContent =
  document.documentElement.classList.contains('dark') ? '☾' : '☀';

const CAT_LABELS = {
  musings: '✍ Musings', learnings: '💡 Learnings', movies: '🎬 Movies',
  books: '📚 Books', photos: '📷 Photos', travel: '✈ Travel', mba: '🎓 MBA',
};

// Sample post content
// In production: fetched from /posts/<slug>.md via the build step (see SETUP.md)
const POSTS = {
  'welcome': {
    title: 'Hello, internet. Here\'s why I\'m doing this.',
    cat: 'musings', date: '2024-12-01', read: '4 min',
    img: 'https://images.unsplash.com/photo-1455390582262-044cdead277a?w=1200&q=80',
    content: `
      <p>I've been meaning to start a public journal for years. The kind where you write things down not because you're an expert, but because thinking in public is a surprisingly good way to think.</p>
      <p>There's something that happens when you commit words to a page — even a page no one might read. The fuzzy half-formed thought has to become a sentence. The sentence has to hold up on its own. And suddenly you realise you didn't actually believe the thing you thought you believed.</p>
      <h2>So what is this place?</h2>
      <p>It's a journal. Not a blog in the polished, SEO-optimised sense. More like the notes app on my phone, but public, and with better formatting.</p>
      <p>I'll write about movies I watched. Books I read. Trips I took. Things I figured out. Things I got wrong. Thoughts that wouldn't leave me alone at 2am.</p>
      <blockquote>Writing is thinking. To write well is to think clearly. That's why it's so hard.</blockquote>
      <p>If you find something useful or resonant here, that's the whole point. Thanks for being here.</p>`
  },
  'tokyo-solo': {
    title: '12 days in Japan, solo, with absolutely no plan.',
    cat: 'travel', date: '2024-10-30', read: '12 min',
    img: 'https://images.unsplash.com/photo-1528360983277-13d401cdc186?w=1200&q=80',
    content: `
      <p>I booked a one-way flight to Tokyo with no hotels booked, no itinerary planned, and a very optimistic attitude toward jet lag.</p>
      <p>Everyone told me Japan rewards planning. They're probably right. But I've found that the best travel experiences tend to happen in the gaps between plans — and if you have no plan, it's gaps all the way down.</p>
      <h2>Day one: landed, overwhelmed, delighted</h2>
      <p>I arrived at Haneda at 6am local time, having not slept on the 10-hour flight. The train into the city was already packed. I had no idea where I was going. It was perfect.</p>
      <blockquote>The mystery of a place is not its strangeness. It's the moment you stop noticing the strangeness.</blockquote>
      <p>I ended up in Shimokitazawa by accident — a neighbourhood I'd never heard of, full of vintage clothing stores, jazz bars, and the best coffee I had the whole trip.</p>`
  },
};

function formatDate(d) {
  return new Date(d).toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });
}

function render() {
  const slug = new URLSearchParams(window.location.search).get('slug') || 'welcome';
  const post = POSTS[slug];

  if (!post) {
    document.getElementById('post-title').textContent = 'Post not found';
    document.getElementById('post-content').innerHTML = '<p>This post doesn\'t exist yet — check back soon.</p>';
    return;
  }

  document.title = post.title + ' — Abbas Merchant';
  document.getElementById('page-desc').content = post.title;
  document.getElementById('og-title').content = post.title + ' — Abbas Merchant';
  document.getElementById('og-desc').content = post.title;

  const tag = document.getElementById('post-tag');
  tag.textContent = CAT_LABELS[post.cat] || post.cat;
  tag.className = 'cat-tag cat-' + post.cat;

  document.getElementById('post-title').textContent = post.title;
  document.getElementById('post-read').textContent = post.read + ' read';
  document.getElementById('post-date').textContent = formatDate(post.date);
  document.getElementById('post-date').setAttribute('datetime', post.date);
  document.getElementById('post-content').innerHTML = post.content;

  if (post.img) {
    const cover = document.getElementById('post-cover');
    cover.src = post.img;
    cover.style.display = 'block';
    document.getElementById('og-image').content = post.img;
  }
}

render();
</script>
</body>
</html>
