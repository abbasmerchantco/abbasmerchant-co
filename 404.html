<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page not found — Abbas Merchant</title>
  <link rel="stylesheet" href="style.css" />
  <script>
    if (localStorage.getItem('theme') === 'dark') document.documentElement.classList.add('dark');
  </script>
</head>
<body>
<nav>
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">Abbas <em>Merchant</em></a>
    <div class="nav-r">
      <a href="index.html" class="nav-link">Journal</a>
      <a href="about.html" class="nav-link">About</a>
      <button class="dark-toggle" id="theme-toggle" onclick="toggleTheme()" aria-label="Toggle dark mode">☀</button>
    </div>
  </div>
</nav>

<div style="max-width:600px;margin:0 auto;padding:8rem 2rem;text-align:center;">
  <div style="font-family:var(--serif);font-size:6rem;font-weight:900;color:var(--border-m);line-height:1;margin-bottom:1.5rem;">404</div>
  <h1 style="font-family:var(--serif);font-size:2rem;font-weight:700;margin-bottom:1rem;">This page doesn't exist.</h1>
  <p style="color:var(--text-s);margin-bottom:2rem;">Maybe it moved, maybe it never existed. Either way — the journal is this way.</p>
  <a href="index.html" style="display:inline-block;padding:10px 24px;background:var(--sky);color:#fff;border-radius:9999px;font-size:13px;font-weight:600;transition:background .15s;">← Back to the journal</a>
</div>

<footer>
  <p>Words and pictures by <strong>Abbas Merchant</strong></p>
</footer>

<script>
function toggleTheme() {
  const dark = document.documentElement.classList.toggle('dark');
  localStorage.setItem('theme', dark ? 'dark' : 'light');
  document.getElementById('theme-toggle').textContent = dark ? '☾' : '☀';
}
document.getElementById('theme-toggle').textContent =
  document.documentElement.classList.contains('dark') ? '☾' : '☀';
</script>
</body>
</html>
